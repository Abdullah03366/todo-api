spring.application.name=demo.todo
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/postgres}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Automatic table creation/updating
spring.jpa.hibernate.ddl-auto=update
# Display the SQL in logs
spring.jpa.show-sql=true

# OpenAPI/Swagger endpoints
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui

# JWT config
app.jwt.secret=${APP_JWT_SECRET:demo.todo.local.secret.demo.todo.local.secret}
app.jwt.expiration-ms=${APP_JWT_EXPIRATION_MS:3600000}

# CORS config for Vue Static Web App + local development
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}

# Azure App Service listens on PORT; local runs keep 8080 as fallback
server.port=${PORT:8080}

